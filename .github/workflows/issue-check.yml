# OpenClaw Auto Dev - Issue 检查定时任务
# 每 30 分钟检查一次新的 openclaw-new Issue

name: Issue Check

on:
  schedule:
    # 每 30 分钟执行一次（每小时的 0 分和 30 分）
    - cron: '0,30 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  check-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GitHub CLI
        run: |
          # GitHub CLI 在 Ubuntu runner 上预装，验证版本
          gh --version
          jq --version

      - name: Check for processing issues
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 检查是否有正在处理的 Issue
          processing=$(gh issue list --state open --label "openclaw-processing" --limit 1 2>&1) || true
          
          if [ -n "$processing" ]; then
            echo "⚠️ 已有 Issue 在处理中，跳过本次检查"
            # 创建标记文件
            echo "processing" > /tmp/scan_status.txt
            exit 0
          fi
          
          echo "✅ 没有正在处理的 Issue"
          echo "idle" > /tmp/scan_status.txt

      - name: Check for new issues
        id: check_new
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # 查询 openclaw-new 状态的 Issue
          new_issues=$(gh issue list --state open --label "openclaw-new" --json number,title,createdAt --limit 1 2>&1) || true
          
          if [ -z "$new_issues" ] || [ "$new_issues" = "[]" ]; then
            echo "ℹ️ 无新 Issue"
            echo "has_new=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "📬 发现新 Issue: $new_issues"
          echo "has_new=true" >> $GITHUB_OUTPUT
          
          # 获取第一个 Issue 的编号
          issue_number=$(echo "$new_issues" | jq -r '.[0].number')
          issue_title=$(echo "$new_issues" | jq -r '.[0].title')
          
          if [ -n "$issue_number" ] && [ "$issue_number" != "null" ]; then
            echo "🎯 准备处理 Issue #$issue_number: $issue_title"
            # 输出到文件供 OpenClaw 读取
            echo "$issue_number" > /tmp/openclaw_issue_number.txt
            echo "$issue_title" > /tmp/openclaw_issue_title.txt
            # 设置输出供后续步骤使用
            echo "issue_number=$issue_number" >> $GITHUB_OUTPUT
            echo "issue_title=$issue_title" >> $GITHUB_OUTPUT
          fi

      - name: Trigger OpenClaw (optional)
        if: steps.check_new.outputs.has_new == 'true'
        env:
          OPENCLAW_WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}
          ISSUE_NUMBER: ${{ steps.check_new.outputs.issue_number }}
        run: |
          # 如果配置了 Webhook，通知 OpenClaw
          if [ -n "$OPENCLAW_WEBHOOK_URL" ]; then
            curl -X POST "$OPENCLAW_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"issue_number\": $ISSUE_NUMBER, \"action\": \"process\"}" \
            || echo "⚠️ Webhook 调用失败，但继续执行"
          else
            echo "ℹ️ 未配置 OPENCLAW_WEBHOOK_URL，跳过通知"
          fi

      - name: Upload scan result
        uses: actions/upload-artifact@v4
        with:
          name: scan-result
          path: /tmp/scan_status.txt
          retention-days: 1
