# OpenClaw Auto Dev - Issue 检查定时任务
# 每 30 分钟检查一次新的 openclaw-new Issue

name: Issue Check

on:
  schedule:
    # 每 30 分钟执行一次（每小时的 0 分和 30 分）
    - cron: '0,30 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  check-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GitHub CLI
        run: |
          gh --version
          jq --version

      # --- Multi-Agent 四角色检查 ---
      # 按顺序检查各阶段是否有正在处理的 Issue
      - name: Check Architect stage
        id: check_architect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          architecting=$(gh issue list --state open --label "openclaw-architecting" --limit 1 2>&1) || true
          if [ -n "$architecting" ] && echo "$architecting" | grep -q "number"; then
            echo "⚠️ Architect 阶段有 Issue 在处理中，跳过"
            echo "status=architecting" > /tmp/scan_status.txt
            echo "has_work=true" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Check for any processing stages
        id: check_processing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 检查所有处理中阶段（multi-agent 流程）
          for label in openclaw-architecting openclaw-planning openclaw-developing openclaw-testing openclaw-reviewing; do
            processing=$(gh issue list --state open --label "$label" --limit 1 2>&1) || true
            if [ -n "$processing" ] && echo "$processing" | grep -q "number"; then
              echo "⚠️ 有 Issue 正在处理 ($label)，跳过本次检查"
              echo "status=processing" > /tmp/scan_status.txt
              echo "has_work=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          done
          echo "has_work=false" >> $GITHUB_OUTPUT

      - name: Check for new issues
        id: check_new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          new_issues=$(gh issue list --state open --label "openclaw-new" --json number,title,createdAt --limit 1 2>&1) || true
          
          if [ -z "$new_issues" ] || [ "$new_issues" = "[]" ]; then
            echo "ℹ️ 无新 Issue"
            echo "status=idle" > /tmp/scan_status.txt
            echo "has_new=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 解析 JSON（gh 输出的是有效 JSON）
          issue_number=$(echo "$new_issues" | jq -r '.[0].number')
          issue_title=$(echo "$new_issues" | jq -r '.[0].title')
          
          if [ -n "$issue_number" ] && [ "$issue_number" != "null" ]; then
            echo "📬 发现新 Issue: #$issue_number - $issue_title"
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "issue_number=$issue_number" >> $GITHUB_OUTPUT
            echo "issue_title=$issue_title" >> $GITHUB_OUTPUT
            echo "$issue_number" > /tmp/openclaw_issue_number.txt
            echo "$issue_title" > /tmp/openclaw_issue_title.txt
          fi

      - name: Trigger OpenClaw
        if: steps.check_new.outputs.has_new == 'true'
        env:
          OPENCLAW_WEBHOOK_URL: ${{ secrets.OPENCLAW_WEBHOOK_URL }}
          ISSUE_NUMBER: ${{ steps.check_new.outputs.issue_number }}
        run: |
          if [ -n "$OPENCLAW_WEBHOOK_URL" ]; then
            curl -X POST "$OPENCLAW_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"issue_number\": $ISSUE_NUMBER, \"action\": \"process\"}" \
            || echo "⚠️ Webhook 调用失败"
          else
            echo "ℹ️ 未配置 OPENCLAW_WEBHOOK_URL，跳过通知"
            echo "请手动触发: gh workflow run issue-check.yml"
          fi

      - name: Upload scan result
        uses: actions/upload-artifact@v4
        with:
          name: scan-result
          path: /tmp/scan_status.txt
          retention-days: 1
